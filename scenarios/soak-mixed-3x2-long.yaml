apiVersion: confluence/v1
kind: Scenario
metadata:
  name: soak-mixed-3x2-long
  description: 3 rippled + 2 go-xrpl, soak workload, 25 min, lighter setup mesh (issue #724 catch-up confidence)
topology:
  rippled:
    count: 3
    image: rippleci/rippled:2.6.2
  goxrpl:
    count: 2
    image: goxrpl:latest
workload:
  kind: soak
  tx_rate: 5
  accounts: 20
  rotate_every: 1000
  mutation_rate: 0.05
observability:
  enabled: false
budget:
  duration: 25m
  stop_on:
    - first_divergence
oracles:
  - state_diff
  - consensus_liveness
  - peer_health
