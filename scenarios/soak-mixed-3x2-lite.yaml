apiVersion: confluence/v1
kind: Scenario
metadata:
  name: soak-mixed-3x2-lite
  description: 3 rippled + 2 go-xrpl, 25min, light 8-acct mesh so setup clears the harness TxQ flood (issue #724 sustained-liveness confirmation)
topology:
  rippled:
    count: 3
    image: rippleci/rippled:2.6.2
  goxrpl:
    count: 2
    image: goxrpl:latest
workload:
  kind: soak
  tx_rate: 5
  accounts: 8
  rotate_every: 1000
  mutation_rate: 0.05
observability:
  enabled: false
budget:
  duration: 25m
  stop_on:
    - first_divergence
oracles:
  - state_diff
  - consensus_liveness
  - peer_health
